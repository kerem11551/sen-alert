plugins {
    id 'com.android.application'
}

android {
    namespace 'com.senalert.app'
    compileSdk 34
    defaultConfig {
        applicationId "com.senalert.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.3.1'
    implementation 'androidx.core:core:1.6.0'
}
